server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|css|js|json|md)$ {
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
